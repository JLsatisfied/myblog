<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="12" fill="url(#bg)"/>
  <!-- Hexagon -->
  <polygon points="50,18 78,34 78,66 50,82 22,66 22,34" fill="none" stroke="#00f0ff" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Inner chevron -->
  <polyline points="35,52 50,38 65,52" fill="none" stroke="#b400ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="35,62 50,48 65,62" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
</svg>
